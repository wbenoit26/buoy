version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

    cooldown:
      default-days: 7

    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
        exclude-patterns:
          - "sphinx*"
          - "myst*"
          - "linkify*"
      documentation:
        patterns:
          - "sphinx*"
          - "myst*"
          - "linkify*"

    versioning-strategy: increase-if-necessary

  - package-ecosystem: "conda"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

    groups:
      conda-deps:
        patterns:
          - "*"
